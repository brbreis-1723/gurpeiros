site_name: Gurpeiros
site_url: https://gurpeiros.com.br/

theme:
  name: material
  language: pt-BR
  logo: assets/imagens/PoweredByGURPS.png
  favicon: assets/imagens/dice.png
  custom_dir: overrides
  palette:
    scheme: slate # dark mode
    primary: black
    accent: amber

use_directory_urls: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md

  - Regras:
      - Resumo: regras/index.md
      - Assinatura: 
          - Visão Geral: regras/assinatura/index.md
          - Como Construir: regras/assinatura/assinatura_construcao.md
          - Tipos de Assinatura: regras/assinatura/assinatura_tipo.md
          - Destino e Complicações: regras/assinatura/assinatura_destino.md
          - Categorias de Complicações: regras/assinatura/assinatura_complicacao.md

  - Cenários:
      - Sobre Cenários: cenarios/index.md
      - Zandia:
          - Introdução:
            - Sobre Zandia: cenarios/zandia/index.md
            - Origem: cenarios/zandia/origem.md
            - História e Cronologia: cenarios/zandia/historia.md

          - Magia:
            - Introdução: cenarios/zandia/magia/index.md
            - Metafísica da magia: cenarios/zandia/magia/metafisica_magia.md
            - Magia do Limiar: cenarios/zandia/magia/magia_limiar.md
            - Tabela de Calamidades: cenarios/zandia/magia/calamidades.md
            - Efeitos adicionais: cenarios/zandia/magia/efeitos_adicionais.md
            - Limiar e Mana: cenarios/zandia/magia/limiar_mana.md
            - Limiar e Energia: cenarios/zandia/magia/magias_energia.md
            - Limiar e Magia Cerimonial: cenarios/zandia/magia/magia_cerimonial.md
            - Magia e Magos: cenarios/zandia/magia/magia_magos.md
          - Personagens:
            - Fichas: cenarios/zandia/personagens/index.md
          - Raças:
            - As Raças de Zandia: cenarios/zandia/racas/index.md
            - Humanos: cenarios/zandia/racas/humanos.md
            - Anões: cenarios/zandia/racas/dwarfs.md
            - Armadilhos: cenarios/zandia/racas/armadilhos.md
            - Clopas: cenarios/zandia/racas/clopas.md
            - Drows: cenarios/zandia/racas/drows.md
            - Homens-Chacal: cenarios/zandia/racas/werejackal.md
            - Krin: cenarios/zandia/racas/krin.md
            - Ratinos: cenarios/zandia/racas/ratinos.md
            - Syridianos: cenarios/zandia/racas/syridianos.md
            - Tressi: cenarios/zandia/racas/tressi.md

          - Religião:
            - Religião em Zandia: cenarios/zandia/religiao/index.md
            - Igreja dos Novos Deuses: cenarios/zandia/religiao/novaigreja.md
            - Patronos: cenarios/zandia/religiao/patronos.md

          - Ideias: 
            - Resumo: cenarios/zandia/ideias/index.md
            - Mar Morto: cenarios/zandia/ideias/mar_morto.md
            - Arquitetos: cenarios/zandia/ideias/arquitetos.md            
            - Filhos da Anarquia: cenarios/zandia/ideias/filhos_anarquia.md

  - Material de Apoio:
      - Resumo: material/index.md
      - Artigos do Blog: material/artigos.md
      - Tabelas: 
        - Relaçao de tabelas:  material/tabelas.md